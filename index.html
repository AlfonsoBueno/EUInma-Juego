<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Eu & Inma: Misión cerveza y cigarro</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#1a1d2e;
    -webkit-tap-highlight-color:transparent; touch-action:none; }
  #game { width:100vw; height:100vh; }
  #game canvas { display:block; }
  /* Hint to rotate on portrait phones */
  #rotate { position:fixed; inset:0; display:none; z-index:10;
    background:#1a1d2e; color:#cfe8ff; font-family:system-ui,sans-serif;
    align-items:center; justify-content:center; text-align:center; padding:24px; }
  #rotate .box { max-width:300px; }
  #rotate .ico { font-size:64px; animation:rot 1.6s ease-in-out infinite; }
  @keyframes rot { 0%,40%{transform:rotate(0)} 60%,100%{transform:rotate(-90deg)} }
  @media (max-aspect-ratio: 1/1) and (max-width: 820px) {
    #rotate { display:flex; }
  }
</style>
</head>
<body>
  <div id="game"></div>
  <div id="rotate"><div class="box">
    <div class="ico">📱</div>
    <h2>Gira el móvil</h2>
    <p>Juega en horizontal para mejor experiencia.</p>
  </div></div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
